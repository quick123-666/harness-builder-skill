name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Package skill
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PACKAGE="harness-builder-skill-${VERSION}"
          mkdir -p "${PACKAGE}"
          cp SKILL.md README.md LICENSE CONTRIBUTING.md "${PACKAGE}/" 2>/dev/null || true
          cp -r references "${PACKAGE}/" 2>/dev/null || true
          zip -r "${PACKAGE}.zip" "${PACKAGE}"
          echo "PACKAGE_NAME=${PACKAGE}.zip" >> "$GITHUB_OUTPUT"
        id: package

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Harness Builder Skill ${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          body: |
            ## 🚀 Harness Builder Skill ${{ steps.version.outputs.VERSION }}
            
            ### 📦 Package Contents
            
            | File | Description |
            |------|-------------|
            | `SKILL.md` | Main documentation |
            | `README.md` | Bilingual documentation (EN/中文) |
            | `LICENSE` | MIT License |
            | `CONTRIBUTING.md` | Contribution guidelines |
            | `references/` | Architecture templates and checklists |
            
            ### 📥 Installation
            
            Download the ZIP and extract to your skills directory:
            
            ```bash
            unzip harness-builder-skill-${{ steps.version.outputs.VERSION }}.zip
            cp -r harness-builder-skill-${{ steps.version.outputs.VERSION }} ~/.qclaw/workspace/skills/harness-builder
            ```
            
            ### 🤝 Contributing
            
            See [CONTRIBUTING.md](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md) for guidelines.
            
            ### 📄 License
            
            MIT License - see [LICENSE](https://github.com/${{ github.repository }}/blob/main/LICENSE) for details.
          files: |
            ${{ steps.package.outputs.PACKAGE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
