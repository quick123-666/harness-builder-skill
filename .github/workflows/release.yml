name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create standard skill package
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          PACKAGE_NAME="harness-builder-skill-${VERSION}"
          
          mkdir -p "${PACKAGE_NAME}"
          cp SKILL.md "${PACKAGE_NAME}/"
          cp README.md "${PACKAGE_NAME}/"
          cp LICENSE "${PACKAGE_NAME}/"
          cp CONTRIBUTING.md "${PACKAGE_NAME}/"
          cp .gitignore "${PACKAGE_NAME}/"
          cp -r references "${PACKAGE_NAME}/"
          
          zip -r "${PACKAGE_NAME}.zip" "${PACKAGE_NAME}/"
          ls -lh "${PACKAGE_NAME}.zip"

      - name: Generate Release Notes
        id: release_notes
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges "${PREVIOUS_TAG}..HEAD")
          fi
          
          {
            echo "NOTES<<EOF"
            echo "## What's Changed"
            echo ""
            echo "${CHANGELOG}"
            echo ""
            echo "## Package Contents"
            echo ""
            echo "| File | Description |"
            echo "|------|-------------|"
            echo "| SKILL.md | Main documentation |"
            echo "| README.md | Bilingual documentation |"
            echo "| LICENSE | MIT License |"
            echo "| CONTRIBUTING.md | Contribution guidelines |"
            echo "| references/ | Architecture templates |"
            echo ""
            echo "## Installation"
            echo ""
            echo '```bash'
            echo "# Download"
            echo "wget https://github.com/${{ github.repository }}/releases/download/${VERSION}/harness-builder-skill-${VERSION}.zip"
            echo ""
            echo "# Extract"
            echo "unzip harness-builder-skill-${VERSION}.zip"
            echo ""
            echo "# Install to OpenClaw"
            echo "cp -r harness-builder-skill-${VERSION} ~/.qclaw/workspace/skills/harness-builder"
            echo '```'
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${VERSION}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Harness Builder Skill ${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.release_notes.outputs.NOTES }}
          files: harness-builder-skill-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## ✅ Release Created Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ steps.get_version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Package**: harness-builder-skill-${{ steps.get_version.outputs.VERSION }}.zip" >> $GITHUB_STEP_SUMMARY

