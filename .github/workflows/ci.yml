name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Validate SKILL.md exists
      run: |
        if [ ! -f "SKILL.md" ]; then
          echo "ERROR: SKILL.md is required"
          exit 1
        fi
        echo "✓ SKILL.md found"
    
    - name: Check file structure
      run: |
        echo "Checking skill structure..."
        ls -la
        echo "✓ Structure validated"
